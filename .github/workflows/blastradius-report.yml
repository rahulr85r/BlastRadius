name: blastradius-report

# Phase 1 — rebuild the dependency graph + blastradius.md on every push to
# main and open a PR with the refreshed report (keeps feature-branch diffs
# free of report churn; the report updates in one mechanical, reviewable PR).
#
# NOTE (consumer repos): this file is for the BlastRadius repo itself —
# it passes --include-self so the skill's own code is indexed. Copy the
# template from the README (identical minus that flag) into your repo.

on:
  push:
    branches: [main]
    paths-ignore:
      - '.claude/skills/blastradius/index/**'
      - 'blastradius.md'
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      force:
        description: "Full rebuild (ignore the incremental hash cache)"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: blastradius-report-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install indexer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .claude/skills/blastradius/requirements.txt

      - name: Rebuild graph and report
        run: python3 .claude/skills/blastradius/run.py --include-self --verbose ${{ inputs.force && '--force' || '' }}

      - name: Open or update report PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Ignore the volatile "> Generated ... at commit" header line when
          # deciding whether the report meaningfully changed.
          if git diff --quiet -I '^> Generated by BlastRadius' -- blastradius.md \
             && [[ -z "$(git status --porcelain .claude/skills/blastradius/index/)" ]]; then
            echo "No meaningful report/graph changes; nothing to do."
            git checkout -- blastradius.md 2>/dev/null || true
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B blastradius/report-update
          git add blastradius.md .claude/skills/blastradius/index/
          git commit -m "[blastradius] update report"
          git push --force origin blastradius/report-update
          if [[ -z "$(gh pr list --head blastradius/report-update --state open --json number --jq '.[0].number')" ]]; then
            gh pr create \
              --base main \
              --head blastradius/report-update \
              --title "[blastradius] update report" \
              --body $'Automated blast-radius report rebuild from CI.\n\nMechanical change — safe to merge after a quick sanity check.'
          fi
